name: Test Coverage and Codecov Report

on:
  pull_request:
    branches: [ develop, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get all changed files in the pull request
        id: changed-files-git
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Determine changed modules from file list
        id: changes
        run: |
          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation dukan_api dukan_data dukan_domain dukan_presentation faith_api faith_data faith_domain faith_presentation identity_api identity_data identity_domain identity_presentation trends_api trends_data trends_domain trends_presentation wallet_api wallet_data wallet_domain wallet_presentation'
          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"
          
          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
          FINAL_MODULES=""
          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
            fi
          done
          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/' <<< "$CHANGED_FILES"; then
            echo "Core project file changed. Overriding to test all modules."
            FINAL_MODULES="$ALL_MODULES"
          fi
          
          JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
          
          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$(echo $JSON_ARRAY)" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          fi
  test:
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.changed_modules) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run Tests & Kover Verification for ${{ matrix.module }}
        id: verify_step
        run: ./gradlew :${{ matrix.module }}:koverVerify --build-cache
        continue-on-error: true

      - name: Generate Kover HTML and XML reports for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:koverXmlReport :${{ matrix.module }}:koverHtmlReport
        continue-on-error: true

      - name: Upload HTML Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-coverage-report-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/kover/html/

      - name: Upload XML Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xml-coverage-report-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/kover/report.xml

      - name: Check verification status
        if: steps.verify_step.outcome == 'failure'
        run: |
          echo "Kover verification or tests failed for ${{ matrix.module }}. Failing the job."
          exit 1

  notify-slack-on-failure:
    if: failure()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Slack on failure
        uses: ./.github/actions/send-pr-notification-to-slack
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-notification-channel-id: ${{ secrets.SLACK_NOTIFICATION_CHANNEL_ID }}
          branch-name: ${{ github.head_ref }}
          message: |
            🚨 *Test Coverage Failed!*
            One or more matrix jobs failed.
            PR: ${{ github.event.pull_request.html_url }}
            Commit: ${{ github.sha }}

  codecov-report:
    needs: [ changed-modules, test ]
    if: always() && needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all Kover XML reports
        uses: actions/download-artifact@v4
        with:
          pattern: "xml-coverage-report-*"
          path: coverage-reports

      - name: Upload reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage-reports/
          fail_ci_if_error: true```

