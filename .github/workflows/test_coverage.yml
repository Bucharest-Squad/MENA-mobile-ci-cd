name: Test Coverage

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        module: [
          core_chat_api, core_chat_data, core_chat_domain, core_chat_presentation,
          dukan_api, dukan_data, dukan_domain, dukan_presentation,
          faith_api, faith_data, faith_domain, faith_presentation,
          identity_api, identity_data, identity_domain, identity_presentation,
          trends_api, trends_data, trends_domain, trends_presentation,
          wallet_api, wallet_data, wallet_domain, wallet_presentation
        ]

      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Clean Project
        run: ./gradlew clean

      - name: Run Test And Kover Verification for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:koverVerify --build-cache
        continue-on-error: false

      - name: Generate coverage report for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:koverXmlReport
        continue-on-error: true

      - name: Publish Unit Test Results for ${{ matrix.module }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ matrix.module }}/build/test-results/**/*.xml
          comment_title: "📊 ${{ matrix.module }} Test Results"
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true

      - name: Upload Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.module }}-coverage-report
          path: ${{ matrix.module }}/build/reports/kover/**/*.xml

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download All Coverage Reports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-coverage-report"
          path: coverage-reports

      - name: List coverage reports directory
        run: ls -R coverage-reports

      - name: Post Combined Coverage Comment
        uses: mi-kas/kover-report@v1.9
        with:
          path: |
            coverage-reports/core_chat_api-coverage-report/report.xml
            coverage-reports/core_chat_data-coverage-report/report.xml
            coverage-reports/core_chat_domain-coverage-report/report.xml
            coverage-reports/core_chat_presentation-coverage-report/report.xml
            coverage-reports/dukan_api-coverage-report/report.xml
            coverage-reports/dukan_data-coverage-report/report.xml
            coverage-reports/dukan_domain-coverage-report/report.xml
            coverage-reports/dukan_presentation-coverage-report/report.xml
            coverage-reports/faith_api-coverage-report/report.xml
            coverage-reports/faith_data-coverage-report/report.xml
            coverage-reports/faith_domain-coverage-report/report.xml
            coverage-reports/faith_presentation-coverage-report/report.xml
            coverage-reports/identity_api-coverage-report/report.xml
            coverage-reports/identity_data-coverage-report/report.xml
            coverage-reports/identity_domain-coverage-report/report.xml
            coverage-reports/identity_presentation-coverage-report/report.xml
            coverage-reports/trends_api-coverage-report/report.xml
            coverage-reports/trends_data-coverage-report/report.xml
            coverage-reports/trends_domain-coverage-report/report.xml
            coverage-reports/trends_presentation-coverage-report/report.xml
            coverage-reports/wallet_api-coverage-report/report.xml
            coverage-reports/wallet_data-coverage-report/report.xml
            coverage-reports/wallet_domain-coverage-report/report.xml
            coverage-reports/wallet_presentation-coverage-report/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🛡️ Total Code Coverage Report"
          update-comment: true
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          coverage-counter-type: LINE
