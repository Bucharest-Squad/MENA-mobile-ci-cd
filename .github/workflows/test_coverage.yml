name: Test Coverage

on:
  pull_request:
    branches: [ develop, main ]

# BEST PRACTICE: Cancel old workflow runs when new commits are pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # This job runs on Linux and executes only the JVM tests for each module.
  test-jvm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        module: [
          core_chat_api, core_chat_data, core_chat_domain, core_chat_presentation,
          dukan_api, dukan_data, dukan_domain, dukan_presentation,
          faith_api, faith_data, faith_domain, faith_presentation,
          identity_api, identity_data, identity_domain, identity_presentation,
          trends_api, trends_data, trends_domain, trends_presentation,
          wallet_api, wallet_data, wallet_domain, wallet_presentation
        ]
      # Ensures all module tests run, even if one fails.
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run JVM Tests & Kover Verification for ${{ matrix.module }}
        # With the Gradle script from Step 1, this now skips modules with no tests.
        # It runs all tasks ending with 'Test' that can execute on the JVM.
        run: ./gradlew :${{ matrix.module }}:clean :${{ matrix.module }}:koverVerify --build-cache

      - name: Publish Unit Test Results for ${{ matrix.module }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ matrix.module }}/build/test-results/**/*.xml
          comment_title: "📊 ${{ matrix.module }} JVM Test Results"
          comment_mode: always

      - name: Upload Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/kover/report.xml

  # This job consolidates all the coverage reports from the JVM tests.
  coverage:
    runs-on: ubuntu-latest
    needs: test-jvm
    # 'always()' ensures this job runs even if some tests fail, so you still get a report.
    if: always()
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download All Coverage Reports
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-report-*"
          path: coverage-reports

      - name: Post Combined Coverage Comment
        uses: mi-kas/kover-report@v1.9
        with:
          # This robust glob pattern automatically finds all report.xml files.
          path: coverage-reports/**/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🛡️ JVM Code Coverage Report"
          update-comment: true
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          coverage-counter-type: LINE
