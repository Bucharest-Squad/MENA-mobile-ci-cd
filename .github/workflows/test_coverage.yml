name: Android CI - Optimized Build (Matrix Version)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 17

jobs:
  detect-changes:
    name: 🔍 Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
      is_root_change: ${{ steps.changes.outputs.is_root_change }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get all changed files in the pull request
        id: changed-files-git
        run: |
          # This git command is the most reliable way to get all changed files in a PR.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # Fallback for direct pushes
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          
          echo "Comparing $BASE_SHA..$HEAD_SHA"
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA)
          
          # Use a heredoc to safely pass the multi-line output to the next step.
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine changed modules from file list
        id: changes
        run: |
          # The complete list of all possible modules. This is the ONLY place you need to edit.
          ALL_MODULES='composeApp design_system identity_presentation core_chat_presentation wallet_presentation faith_presentation dukan_presentation trends_presentation identity_api core_chat_api wallet_api faith_api dukan_api trends_api identity_domain core_chat_domain wallet_domain faith_domain dukan_domain trends_domain identity_data core_chat_data wallet_data dukan_data faith_data trends_data'
          
          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"
          
          # Check for root-level changes first.
          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/' <<< "$CHANGED_FILES"; then
            echo "Core project file changed. Building all modules."
            FINAL_MODULES="$ALL_MODULES"
            echo "is_root_change=true" >> $GITHUB_OUTPUT
          else
            # Otherwise, find modules based on changed file paths.
            declare -a UNIQUE_MODULES
            echo "$CHANGED_FILES" | while IFS= read -r line; do
              if [ -n "$line" ]; then
                module=$(echo "$line" | awk -F/ '{print $1}')
                if [[ " $ALL_MODULES " =~ " $module " && ! " ${UNIQUE_MODULES[@]} " =~ " $module " ]]; then
                  UNIQUE_MODULES+=("$module")
                fi
              fi
            done
            FINAL_MODULES=$(echo "${UNIQUE_MODULES[*]}")
            echo "is_root_change=false" >> $GITHUB_OUTPUT
          fi
          
          # Convert the final list to a JSON array for the matrix.
          JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
          
          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$(echo $JSON_ARRAY)" >> $GITHUB_OUTPUT
            echo "Modules to build: $(echo $JSON_ARRAY)"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
            echo "No relevant module changes detected."
          fi

  build-module:
    name: 🏗️ Build ${{ matrix.module }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.changed_modules) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:assembleDebug --build-cache

  build-summary:
    name: 📊 Build Summary
    needs: [detect-changes, build-module]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report overall status
        run: |
          echo "## 📋 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Case 1: A root change triggered a full build.
          if [[ "${{ needs.detect-changes.outputs.is_root_change }}" == "true" ]]; then
            echo "🔄 **Full build executed** because root configuration files changed." >> $GITHUB_STEP_SUMMARY
            # Check if the build itself passed or failed.
            if [[ "${{ needs.build-module.result }}" == "failure" ]]; then
              echo "🔴 **Build failed.**" >> $GITHUB_STEP_SUMMARY
              exit 1
            else
              echo "✅ **Build succeeded.**" >> $GITHUB_STEP_SUMMARY
            fi
            exit 0
          fi
          
          # Case 2: A selective build was run.
          if [[ "${{ needs.detect-changes.outputs.has_changes }}" == "true" ]]; then
            echo "🎯 **Selective build executed.**" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ needs.build-module.result }}" == "failure" ]]; then
              echo "🔴 **One or more modules failed to build.** Please check the 'Build module' jobs for details." >> $GITHUB_STEP_SUMMARY
              exit 1
            else
              echo "✅ **All changed modules built successfully.**" >> $GITHUB_STEP_SUMMARY
              echo "Modules built: ${{ needs.detect-changes.outputs.changed_modules }}" >> $GITHUB_STEP_SUMMARY
            fi
          # Case 3: No changes were found.
          else
            echo "ℹ️ **No build was needed** - no relevant module changes were detected." >> $GITHUB_STEP_SUMMARY
          fi
