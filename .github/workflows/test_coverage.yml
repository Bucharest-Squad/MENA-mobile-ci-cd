name: Test Coverage

on:
  pull_request:
    branches: [ develop, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get all changed files in the pull request
        id: changed-files-git
        run: |
          # This git command is the most reliable way to get all changed files in a PR.
          # It directly compares the PR's base commit with its head commit on every run.
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          
          # Use a heredoc to safely pass the potentially multi-line output to the next step.
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine changed modules from file list
        id: changes
        run: |
          # The complete list of all possible modules. This is the only place you need to edit.
          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation dukan_api dukan_data dukan_domain dukan_presentation faith_api faith_data faith_domain faith_presentation identity_api identity_data identity_domain identity_presentation trends_api trends_data trends_domain trends_presentation wallet_api wallet_data wallet_domain wallet_presentation'
          
          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"
          
          echo "--- Files Changed in this PR ---"
          echo "$CHANGED_FILES"
          echo "--------------------------------"

          # 1. Get a list of all module directories from the changed files.
          # 2. Use a standard 'sort -u' pipeline to get a unique, sorted list. This is very robust.
          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
          
          echo "--- Unique Module Directories Detected ---"
          echo "$UNIQUE_MODULE_LIST"
          echo "----------------------------------------"

          # 3. Filter this unique list against your master list to ensure they are valid modules.
          FINAL_MODULES=""
          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
            fi
          done

          # Safeguard: If core build files change, force a test of all modules.
          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/' <<< "$CHANGED_FILES"; then
            echo "Core project file changed. Overriding to test all modules."
            FINAL_MODULES="$ALL_MODULES"
          fi
          
          # Convert the final list to a JSON array for the matrix.
          JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
          
          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$(echo $JSON_ARRAY)" >> $GITHUB_OUTPUT
            echo "Final modules to test: $(echo $JSON_ARRAY)"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
            echo "No relevant module changes detected."
          fi

  test:
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.changed_modules) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run Tests & Kover Verification for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:koverVerify --build-cache

      - name: Publish Unit Test Results for ${{ matrix.module }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ matrix.module }}/build/test-results/**/*.xml
          comment_title: "📊 ${{ matrix.module }} Test Results"
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true

      - name: Upload Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/kover/report.xml

  coverage:
    needs: [changed-modules, test]
    if: always() && needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download All Coverage Reports
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-report-*"
          path: coverage-reports

      - name: List coverage reports directory
        run: ls -R coverage-reports

      - name: Post Combined Coverage Comment
        uses: mi-kas/kover-report@v1.9
        with:
          path: coverage-reports/**/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🛡️ Total Code Coverage Report"
          update-comment: true
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          coverage-counter-type: LINE
