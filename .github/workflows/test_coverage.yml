name: Test Coverage

on:
  pull_request:
    branches: [ develop, main ]

# BEST PRACTICE: Cancel old workflow runs when new commits are pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # This job runs first to determine which modules were affected by the changes.
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Required for the changed-files action to compare against the base branch.
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*

      - name: Determine changed modules
        id: changes
        run: |
          # The complete list of all possible modules in your project.
          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation dukan_api dukan_data dukan_domain dukan_presentation faith_api faith_data faith_domain faith_presentation identity_api identity_data identity_domain identity_presentation trends_api trends_data trends_domain trends_presentation wallet_api wallet_data wallet_domain wallet_presentation'
          
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"

          # If core configuration files change, run tests for all modules as a safeguard.
          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/' <<< "$CHANGED_FILES"; then
            echo "Core project file changed. Testing all modules."
            JSON_ARRAY=$(echo $ALL_MODULES | jq -R 'split(" ")' | jq -c '.')
          else
            # Otherwise, determine modules from changed file paths.
            CHANGED_MODULE_DIRS=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u | uniq)
            FINAL_MODULES=""
            for module in $CHANGED_MODULE_DIRS; do
              if [[ " $ALL_MODULES " =~ " $module " ]]; then
                FINAL_MODULES="$FINAL_MODULES $module"
              fi
            done
            JSON_ARRAY=$(echo "$FINAL_MODULES" | sed 's/^ *//g' | jq -R 'split(" ")' | jq -c '.')
          fi

          # Set the final outputs for subsequent jobs.
          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$(echo $JSON_ARRAY | jq -c .)" >> $GITHUB_OUTPUT
            echo "Detected changes in modules: $(echo $JSON_ARRAY)"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
            echo "No relevant module changes detected."
          fi

  test:
    needs: changed-modules
    # This job will only run if the 'changed-modules' job found relevant changes.
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      # The matrix is now dynamically populated from the output of the previous job.
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.changed_modules) }}
      # Ensures all module tests run, even if one fails.
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run Tests & Kover Verification for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:koverVerify --build-cache

      - name: Publish Unit Test Results for ${{ matrix.module }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ matrix.module }}/build/test-results/**/*.xml
          comment_title: "📊 ${{ matrix.module }} Test Results"
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true

      - name: Upload Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/kover/report.xml

  coverage:
    needs: [changed-modules, test]
    # This job also only runs if there were changes, and it runs even if tests fail.
    if: always() && needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download All Coverage Reports
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-report-*"
          path: coverage-reports

      - name: List coverage reports directory
        run: ls -R coverage-reports

      - name: Post Combined Coverage Comment
        uses: mi-kas/kover-report@v1.9
        with:
          path: coverage-reports/**/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🛡️ Total Code Coverage Report"
          update-comment: true
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          coverage-counter-type: LINE```
