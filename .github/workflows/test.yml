name: Test Coverage and Codecov Report

on:
  pull_request:
    branches: [ develop, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changed-modules:
    uses: ./.github/workflows/changed-modules.yml

  test:
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.modules) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run Tests & Kover Verification for ${{ matrix.module }}
        id: verify_step
        run: ./gradlew :${{ matrix.module }}:koverVerify --build-cache
        continue-on-error: true

      - name: Generate Kover HTML and XML reports for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:koverXmlReport :${{ matrix.module }}:koverHtmlReport
        continue-on-error: true

      - name: Upload HTML Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-coverage-report-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/kover/html/

      - name: Upload XML Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xml-coverage-report-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/kover/report.xml

      - name: Check verification status
        if: steps.verify_step.outcome == 'failure'
        run: |
          echo "Kover verification or tests failed for ${{ matrix.module }}. Failing the job."
          exit 1

  codecov-report:
    needs: [ changed-modules, test ]
    if: always() && needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all Kover XML reports
        uses: actions/download-artifact@v4
        with:
          pattern: "xml-coverage-report-*"
          path: coverage-reports

      - name: Upload reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage-reports/
          fail_ci_if_error: true