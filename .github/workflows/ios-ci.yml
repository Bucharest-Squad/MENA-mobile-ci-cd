name: iOS CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  ios-build:
    uses: ./.github/workflows/changed-modules.yml
    secrets: inherit

  build:
    needs: ios-build
    if: needs.ios-build.outputs.has_changes == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build all changed iOS modules
        run: ./gradlew $(for m in $(echo '${{ needs.ios-build.outputs.ios_modules }}' | jq -r '.[]'); do echo ":$m:linkDebugFrameworkIosSimulatorArm64"; done)

      - name: Build iOS App if iosApp changed
        if: needs.ios-build.outputs.has_ios_changes == 'true'
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  notify-slack-on-failure:
    if: failure()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Slack on failure
        uses: ./.github/actions/slack/send-pr-notification
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-notification-channel-id: ${{ secrets.SLACK_NOTIFICATION_CHANNEL_ID }}
          bot-app-id: ${{ secrets.BOT_APP_ID }}
          branch-name: ${{ github.head_ref }}
          message: |
            🚨 *Build Failed on IOS!*
            One or more matrix jobs failed.
            PR: ${{ github.event.pull_request.html_url }}
            Commit: ${{ github.sha }}