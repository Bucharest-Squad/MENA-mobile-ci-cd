name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
      build_all: ${{ steps.changes.outputs.build_all }}
      has_ios_changes: ${{ steps.changes.outputs.has_ios_changes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get all changed files
        id: changed-files-git
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            # For push events, compare with previous commit
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          fi
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine changed modules from file list
        id: changes
        run: |
          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation dukan_api dukan_data dukan_domain dukan_presentation faith_api faith_data faith_domain faith_presentation identity_api identity_data identity_domain identity_presentation trends_api trends_data trends_domain trends_presentation wallet_api wallet_data wallet_domain wallet_presentation'
          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"
          
          # Check if iOS-specific files changed
          if grep -qE '^iosApp/' <<< "$CHANGED_FILES"; then
            echo "has_ios_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_ios_changes=false" >> $GITHUB_OUTPUT
          fi
          
          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
          FINAL_MODULES=""
          
          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
            fi
          done
          
          # Check if core project files changed - if so, build everything
          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/|^iosApp/' <<< "$CHANGED_FILES"; then
            echo "Core project file or iOS app changed. Building all modules."
            echo "build_all=true" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
          
            if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
              echo "build_all=false" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "modules=$(echo $JSON_ARRAY)" >> $GITHUB_OUTPUT
            else
              echo "build_all=false" >> $GITHUB_OUTPUT
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "modules=[]" >> $GITHUB_OUTPUT
            fi
          fi

  ios-build:
    name: iOS Build Check
    needs: changed-modules
    runs-on: macos-latest
    if: needs.changed-modules.outputs.has_changes == 'true'
    strategy:
      matrix:
        include:
          - build_type: "full"
            condition: ${{ needs.changed-modules.outputs.build_all == 'true' }}
          - build_type: "selective"
            condition: ${{ needs.changed-modules.outputs.build_all == 'false' }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Select Xcode version
        run: xcodebuild -version

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Discover Project Structure
        id: discover
        run: |
          echo "Available projects:"
          ./gradlew projects --quiet
          
          echo "Available tasks in composeApp:"
          ./gradlew :composeApp:tasks --group="build" --quiet || true
          
          echo "Searching for iOS-related tasks:"
          ./gradlew tasks --all | grep -i ios || echo "No iOS-specific tasks found"
          
          echo "Searching for framework/library tasks:"
          ./gradlew tasks --all | grep -E "(framework|library|assemble)" | head -10 || echo "No framework tasks found"
          
          # Try to find iOS/KMP build tasks
          BUILD_TASK=""
          if ./gradlew tasks --all | grep -q "embedAndSignAppleFrameworkForXcode"; then
            BUILD_TASK="embedAndSignAppleFrameworkForXcode"
          elif ./gradlew tasks --all | grep -q "assembleDebugAppleFrameworkForXcode"; then
            BUILD_TASK="assembleDebugAppleFrameworkForXcode"
          elif ./gradlew tasks --all | grep -q "iosSimulatorArm64MainBinaries"; then
            BUILD_TASK="iosSimulatorArm64MainBinaries"
          elif ./gradlew tasks --all | grep -q "linkDebugFrameworkIosSimulatorArm64"; then
            BUILD_TASK="linkDebugFrameworkIosSimulatorArm64"
          elif ./gradlew tasks --all | grep -q ":composeApp:build"; then
            BUILD_TASK="build"
          else
            BUILD_TASK="build"
          fi
          
          echo "build_task=$BUILD_TASK" >> $GITHUB_OUTPUT
          echo "Detected build task: $BUILD_TASK"

      - name: Build All KMP Modules (Full Build)
        if: matrix.build_type == 'full' && needs.changed-modules.outputs.build_all == 'true'
        run: |
          BUILD_TASK="${{ steps.discover.outputs.build_task }}"
          echo "Building with task: $BUILD_TASK"
          
          if [ "$BUILD_TASK" = "build" ]; then
            # Standard build - should work for most KMP projects
            ./gradlew :composeApp:build
          else
            # iOS-specific task
            ./gradlew :composeApp:$BUILD_TASK
          fi

      - name: Build Changed KMP Modules Only
        if: matrix.build_type == 'selective' && needs.changed-modules.outputs.build_all == 'false'
        run: |
          BUILD_TASK="${{ steps.discover.outputs.build_task }}"
          MODULES='${{ needs.changed-modules.outputs.changed_modules }}'
          
          echo "Building with task: $BUILD_TASK"
          echo "Changed modules: $MODULES"
          
          if [ "$MODULES" != "[]" ]; then
            echo "Building composeApp due to changes in modules: $MODULES"
            if [ "$BUILD_TASK" = "build" ]; then
              ./gradlew :composeApp:build
            else
              ./gradlew :composeApp:$BUILD_TASK
            fi
          else
            echo "Building composeApp for iOS compatibility"
            if [ "$BUILD_TASK" = "build" ]; then
              ./gradlew :composeApp:build
            else
              ./gradlew :composeApp:$BUILD_TASK
            fi
          fi

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -resolvePackageDependencies

      - name: List Available Simulators
        run: |
          echo "Available iOS Simulators:"
          xcrun simctl list devices iOS --json | jq -r '.devices | to_entries[] | .key as $os | .value[] | select(.isAvailable == true) | "\(.name) (\($os))"' | head -10

      - name: Build iOS App for Simulator
        run: |
          # Use the latest available iPhone 16 simulator
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  ios-build-summary:
    name: iOS Build Summary
    needs: [changed-modules, ios-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          if [ "${{ needs.changed-modules.outputs.has_changes }}" = "false" ]; then
            echo "✅ No changes detected in modules that affect iOS. Skipping build."
          elif [ "${{ needs.changed-modules.outputs.has_ios_changes }}" = "true" ]; then
            echo "📱 iOS app files changed - full rebuild required."
          elif [ "${{ needs.changed-modules.outputs.build_all }}" = "true" ]; then
            echo "🔨 Built all modules due to core file changes."
          else
            echo "🎯 Built shared module due to changes in: ${{ needs.changed-modules.outputs.changed_modules }}"
          fi