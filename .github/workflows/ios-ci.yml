name: iOS CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
      ios_changed: ${{ steps.changes.outputs.ios_changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files-git
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine changed modules
        id: changes
        run: |
          # Define Kotlin Multiplatform modules that affect iOS
          KMP_MODULES='
          data:repositories:vod
          data:remote_data_source:vod
          data:local_data_source:vod
          domain:vod
          domain:identity
          data:local_data_source:identity
          data:remote_data_source:identity
          data:repositories:identity
          '
          
          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check if iOS app changed
          IOS_CHANGED=false
          if echo "$CHANGED_FILES" | grep -qE '^iosApp/'; then
            IOS_CHANGED=true
            echo "iOS app files changed"
          fi
          
          # Extract unique module paths from changed files
          UNIQUE_MODULE_PATHS=$(echo "$CHANGED_FILES" | grep -v '^iosApp/' | sed 's|/[^/]*$||' | sort -u)
          
          FINAL_MODULES=""
          for changed_path in $UNIQUE_MODULE_PATHS; do
            # Convert file path to module format (e.g., domain/vod -> domain:vod)
            MODULE_PATH=$(echo "$changed_path" | tr '/' ':')
          
            # Check if this module affects iOS (KMP modules)
            if echo "$KMP_MODULES" | grep -qw "$MODULE_PATH"; then
              FINAL_MODULES="$FINAL_MODULES $MODULE_PATH"
              IOS_CHANGED=true
              echo "Found changed KMP module affecting iOS: $MODULE_PATH"
            fi
          done
          
          # If core project files changed, build all and set iOS changed
          if echo "$CHANGED_FILES" | grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/|^build-logic/'; then
            echo "Core project files changed. Building all KMP modules."
            FINAL_MODULES="$KMP_MODULES"
            IOS_CHANGED=true
          fi
          
          # Remove duplicates and convert to JSON array
          UNIQUE_MODULES=$(echo "$FINAL_MODULES" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          JSON_ARRAY=$(echo "$UNIQUE_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
          
          echo "Final KMP modules to build: $JSON_ARRAY"
          
          if [ "$(echo "$JSON_ARRAY" | jq 'length')" -gt 0 ] || [ "$IOS_CHANGED" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$JSON_ARRAY" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          fi
          
          echo "ios_changed=$IOS_CHANGED" >> $GITHUB_OUTPUT

  build-kmp-modules:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && fromJSON(needs.detect-changes.outputs.changed_modules)[0] != null
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.changed_modules) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build KMP Module ${{ matrix.module }} for iOS
        run: ./gradlew :${{ matrix.module }}:compileKotlinIosArm64 :${{ matrix.module }}:compileKotlinIosSimulatorArm64 --build-cache

  ios-build:
    needs: [detect-changes, build-kmp-modules]
    if: always() && needs.detect-changes.outputs.ios_changed == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Select Xcode version
        run: xcodebuild -version

      - name: Build KMP framework for iOS (if needed)
        run: ./gradlew embedAndSignAppleFrameworkForXcode --build-cache

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -resolvePackageDependencies

      - name: Build iOS App for Simulator
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO