name: iOS CI

on:
  workflow_run:
    workflows: ["Detect Changed Modules"]
    types:
      - completed

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: detect-results

      - name: Load detect results
        id: vars
        run: |
          while IFS== read -r key value; do
            echo "$key=$value" >> $GITHUB_ENV
          done < detect_env.txt

      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - run: chmod +x gradlew

      - name: Build all changed iOS modules
        if: env.has_changes == 'true'
        run: ./gradlew $(for m in $(echo $ios_modules | jq -r '.[]'); do echo ":$m:linkDebugFrameworkIosSimulatorArm64"; done)

      - name: Build iOS App if iosApp changed
        if: env.has_ios_changes == 'true'
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO