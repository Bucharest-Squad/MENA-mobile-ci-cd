name: iOS

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  detect:
    name: Detect Changes
    uses: ./.github/workflows/changed-modules.yml
    secrets: inherit

  build:
    name: Build
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build KMP modules
        run: ./gradlew $(for m in $(echo '${{ needs.detect.outputs.ios_modules }}' | jq -r '.[]'); do echo ":$m:linkDebugFrameworkIosSimulatorArm64"; done) --parallel --build-cache

      - name: Build iOS app
        if: needs.detect.outputs.has_ios_changes == 'true'
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO