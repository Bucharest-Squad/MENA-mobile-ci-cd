name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get all changed files
        id: changed-files-git
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          fi
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine changed modules from file list
        id: changes
        run: |
          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation dukan_api dukan_data dukan_domain dukan_presentation faith_api faith_data faith_domain faith_presentation identity_api identity_data identity_domain identity_presentation trends_api trends_data trends_domain trends_presentation wallet_api wallet_data wallet_domain wallet_presentation'
          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"

          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
          FINAL_MODULES=""

          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
            fi
          done

          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/|^app/' <<< "$CHANGED_FILES"; then
            echo "Core project/app files changed. Overriding to build all modules."
            FINAL_MODULES="$ALL_MODULES"
          fi

          JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')

          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$(echo $JSON_ARRAY)" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          fi

  android-build:
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.changed_modules) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Build Changed Module ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:assemble

      - name: Build Main App
        run: ./gradlew :app:assembleDebug

      - name: Upload Android APK
        if: github.event_name == 'push' && always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: app/build/outputs/apk/debug/*.apk

  notify-slack-on-failure:
    if: failure()
    needs: android-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
      - uses: actions/checkout@v4

      - name: Notify Slack on failure
        uses: ./.github/actions/send-pr-notification-to-slack
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-notification-channel-id: ${{ secrets.SLACK_NOTIFICATION_CHANNEL_ID }}
          branch-name: ${{ github.head_ref }}
          message: |
            🚨 *Build Failed on Android!*
            One or more matrix jobs failed.
            PR: ${{ github.event.pull_request.html_url }}
            Commit: ${{ github.sha }}

  android-build-summary:
    needs: [changed-modules, android-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          if [ "${{ needs.changed-modules.outputs.has_changes }}" = "false" ]; then
            echo "✅ No changes detected in Android modules. Skipping build."
          else
            echo "🎯 Built modules: ${{ needs.changed-modules.outputs.changed_modules }}"
          fi