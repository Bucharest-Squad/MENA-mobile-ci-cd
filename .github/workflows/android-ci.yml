name: Android CI

on:
  workflow_run:
    workflows: ["Detect Changed Modules"]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: detect-results

      - name: Load detect results
        id: vars
        run: |
          while IFS== read -r key value; do
            echo "$key=$value" >> $GITHUB_ENV
          done < detect_env.txt

      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - run: chmod +x gradlew

      - name: Build all changed Android modules
        if: env.has_changes == 'true'
        run: ./gradlew $(for m in $(echo $modules | jq -r '.[]'); do echo ":$m:assemble"; done)