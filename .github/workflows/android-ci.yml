name: Android CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
      app_changed: ${{ steps.changes.outputs.app_changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files-git
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine changed modules
        id: changes
        run: |
          # Define all your modules based on your settings.gradle
          ALL_MODULES='
          data:repositories:vod
          data:remote_data_source:vod
          data:local_data_source:vod
          feature:authentication:presentation
          feature:authentication:api
          feature:home:api
          feature:home:presentation
          feature:user_profile:api
          feature:user_profile:presentation
          feature:playlists:api
          feature:playlists:presentation
          feature:search:api
          feature:search:presentation
          feature:media_details:api
          feature:media_details:presentation
          feature:onboarding:api
          feature:onboarding:presentation
          feature:category:api
          feature:category:presentation
          domain:vod
          domain:identity
          data:local_data_source:identity
          data:remote_data_source:identity
          data:repositories:identity
          image_viewer
          design_system
          tvapp
          '
          
          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check if app module changed
          APP_CHANGED=false
          if echo "$CHANGED_FILES" | grep -qE '^app/'; then
            APP_CHANGED=true
            echo "App module changed"
          fi
          
          # Extract unique module paths from changed files
          UNIQUE_MODULE_PATHS=$(echo "$CHANGED_FILES" | grep -v '^app/' | sed 's|/[^/]*$||' | sort -u)
          
          FINAL_MODULES=""
          for changed_path in $UNIQUE_MODULE_PATHS; do
            # Convert file path to module format (e.g., feature/home/api -> feature:home:api)
            MODULE_PATH=$(echo "$changed_path" | tr '/' ':')
          
            # Check if this module exists in our ALL_MODULES list
            if echo "$ALL_MODULES" | grep -qw "$MODULE_PATH"; then
              FINAL_MODULES="$FINAL_MODULES $MODULE_PATH"
              echo "Found changed module: $MODULE_PATH"
            fi
          done
          
          # If core project files changed, build all modules
          if echo "$CHANGED_FILES" | grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/|^build-logic/'; then
            echo "Core project files changed. Building all modules."
            FINAL_MODULES="$ALL_MODULES"
            APP_CHANGED=true
          fi
          
          # Remove duplicates and convert to JSON array
          UNIQUE_MODULES=$(echo "$FINAL_MODULES" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          JSON_ARRAY=$(echo "$UNIQUE_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
          
          echo "Final modules to build: $JSON_ARRAY"
          
          if [ "$(echo "$JSON_ARRAY" | jq 'length')" -gt 0 ] || [ "$APP_CHANGED" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$JSON_ARRAY" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          fi
          
          echo "app_changed=$APP_CHANGED" >> $GITHUB_OUTPUT

  build-affected-modules:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.changed_modules) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build Module ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:build --build-cache

  build-app:
    needs: [detect-changes, build-affected-modules]
    if: always() && needs.detect-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build Android App
        run: ./gradlew assembleDebug --build-cache

      - name: Upload Android APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: app/build/outputs/apk/debug/*.apk