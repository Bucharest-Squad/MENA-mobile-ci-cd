name: Android CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  android-build:
    uses: ./.github/workflows/changed-modules.yml
    secrets: inherit

  build:
    needs: android-build
    if: needs.android-build.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build all changed Android modules
        run: ./gradlew $(for m in $(echo '${{ needs.android-build.outputs.modules }}' | jq -r '.[]'); do echo ":$m:assemble"; done)