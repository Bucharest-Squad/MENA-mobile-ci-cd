name: Android

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  detect:
    name: Detect Changes
    uses: ./.github/workflows/changed-modules.yml
    secrets: inherit

  build:
    name: Build
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build modules
        run: |
          MODULES='${{ needs.detect.outputs.modules }}'
          TASKS=""
          for m in $(echo "$MODULES" | jq -r '.[]'); do
            if [[ "$m" == *"_presentation" ]]; then
              TASKS="$TASKS :$m:assembleDebug"
            else
              TASKS="$TASKS :$m:compileDebugKotlinAndroid"
            fi
          done
          ./gradlew $TASKS --parallel --build-cache