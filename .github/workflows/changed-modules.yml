name: Detect Changed Modules

on:
  workflow_call:
    outputs:
      modules:
        description: "Changed modules"
        value: ${{ jobs.detect.outputs.modules }}
      has_changes:
        description: "If there are any changes"
        value: ${{ jobs.detect.outputs.has_changes }}
      ios_modules:
        description: "Changed iOS-capable modules"
        value: ${{ jobs.detect.outputs.ios_modules }}
      has_ios_changes:
        description: "If there are iOS app changes"
        value: ${{ jobs.detect.outputs.has_ios_changes }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
      ios_modules: ${{ steps.changes.outputs.ios_modules }}
      has_ios_changes: ${{ steps.changes.outputs.has_ios_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files-git
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          fi
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine modules
        id: changes
        run: |
          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation dukan_api dukan_data dukan_domain dukan_presentation faith_api faith_data faith_domain faith_presentation identity_api identity_data identity_domain identity_presentation trends_api trends_data trends_domain trends_presentation wallet_api wallet_data wallet_domain wallet_presentation'
          IOS_MODULES='core_chat_presentation dukan_presentation faith_presentation identity_presentation trends_presentation wallet_presentation'
          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"

          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
          FINAL_MODULES=""
          IOS_FINAL_MODULES=""

          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
            fi
            if [[ " $IOS_MODULES " =~ " $module " ]]; then
              IOS_FINAL_MODULES="$IOS_FINAL_MODULES $module"
            fi
          done

          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/' <<< "$CHANGED_FILES"; then
            FINAL_MODULES="$ALL_MODULES"
          fi
          if grep -qE '^iosApp/' <<< "$CHANGED_FILES"; then
            IOS_FINAL_MODULES="$IOS_MODULES"
            echo "has_ios_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_ios_changes=false" >> $GITHUB_OUTPUT
          fi

          JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
          IOS_JSON_ARRAY=$(echo "$IOS_FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')

          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$JSON_ARRAY" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          fi

          echo "ios_modules=$IOS_JSON_ARRAY" >> $GITHUB_OUTPUT