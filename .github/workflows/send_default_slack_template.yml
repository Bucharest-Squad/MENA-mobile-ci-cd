name: Send Slack Messages

on:
  workflow_dispatch:


jobs:
  create-slack-notification-template:
    runs-on: ubuntu-latest
    steps:
      - name: Send messages to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_NOTIFICATION_CHANNEL_ID: ${{ secrets.SLACK_NOTIFICATION_CHANNEL_ID }}
        run: |
          #!/bin/bash
          
          REGIONS=("IDN" "DKN" "CHT" "FTH" "TRN" "WLT")
          
          for REGION in "${REGIONS[@]}"; do
            MESSAGE="${REGION} prs info"
          
            echo "Sending Slack notification for $REGION..."
            curl -X POST https://slack.com/api/chat.postMessage \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-type: application/json; charset=utf-8" \
                --data "{
                  \"channel\": \"$SLACK_NOTIFICATION_CHANNEL_ID\",
                  \"blocks\": [
                    {
                      \"type\": \"section\",
                      \"text\": {
                        \"type\": \"mrkdwn\",
                        \"text\": \"$MESSAGE\"
                      }
                    }
                  ]
                }"
          done
