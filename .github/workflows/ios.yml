name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      ios_modules: ${{ steps.changes.outputs.ios_modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
      has_ios_changes: ${{ steps.changes.outputs.has_ios_changes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get all changed files
        id: changed-files-git
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          fi
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine iOS changed modules
        id: changes
        run: |
          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation dukan_api dukan_data dukan_domain dukan_presentation faith_api faith_data faith_domain faith_presentation identity_api identity_data identity_domain identity_presentation trends_api trends_data trends_domain trends_presentation wallet_api wallet_data wallet_domain wallet_presentation'

          IOS_MODULES='core_chat_presentation dukan_presentation faith_presentation identity_presentation trends_presentation wallet_presentation'

          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"

          if grep -qE '^iosApp/' <<< "$CHANGED_FILES"; then
            echo "has_ios_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_ios_changes=false" >> $GITHUB_OUTPUT
          fi

          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
          FINAL_MODULES=""

          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]] && [[ " $IOS_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
            fi
          done

          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/|^iosApp/' <<< "$CHANGED_FILES"; then
            echo "Core project/iOS files changed. Overriding to build all iOS-capable modules."
            FINAL_MODULES="$IOS_MODULES"
          fi

          JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')

          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "ios_modules=$(echo $JSON_ARRAY)" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ios_modules=[]" >> $GITHUB_OUTPUT
          fi

  ios-build:
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.ios_modules) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Build iOS framework for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS App (if iosApp changed)
        if: needs.changed-modules.outputs.has_ios_changes == 'true'
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  ios-build-summary:
    needs: [changed-modules, ios-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          if [ "${{ needs.changed-modules.outputs.has_changes }}" = "false" ]; then
            echo "✅ No changes detected in iOS-related modules. Skipping build."
          elif [ "${{ needs.changed-modules.outputs.has_ios_changes }}" = "true" ]; then
            echo "📱 iOS app files changed - full rebuild triggered."
          else
            echo "🎯 Built iOS module(s): ${{ needs.changed-modules.outputs.ios_modules }}"
          fi