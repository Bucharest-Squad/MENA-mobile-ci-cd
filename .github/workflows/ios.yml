name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: git-diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only \
              ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine changed modules
        id: changes
        run: |
          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation \
          dukan_api dukan_data dukan_domain dukan_presentation \
          faith_api faith_data faith_domain faith_presentation \
          identity_api identity_data identity_domain identity_presentation \
          trends_api trends_data trends_domain trends_presentation \
          wallet_api wallet_data wallet_domain wallet_presentation \
          composeApp'

          CHANGED_FILES="${{ steps.git-diff.outputs.files }}"
          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)

          FINAL_MODULES=""
          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
            fi
          done

          # If core Gradle or iOS app files changed → build everything
          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/|^iosApp/' <<< "$CHANGED_FILES"; then
            FINAL_MODULES="$ALL_MODULES"
          fi

          JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')

          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$JSON_ARRAY" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          fi

  ios-build:
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: macos-15
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.changed_modules) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - run: chmod +x gradlew

      - name: Discover iOS build task
        id: discover
        run: |
          BUILD_TASK="linkDebugFrameworkIosSimulatorArm64"
          if ! ./gradlew tasks --all | grep -q "$BUILD_TASK"; then
            BUILD_TASK="assembleDebugIosSimulatorArm64"
          fi
          echo "build_task=$BUILD_TASK" >> $GITHUB_OUTPUT

      - name: Build changed module ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:${{ steps.discover.outputs.build_task }}