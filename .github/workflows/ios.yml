name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
      build_all: ${{ steps.changes.outputs.build_all }}
      has_ios_changes: ${{ steps.changes.outputs.has_ios_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          fi

          ALL_MODULES='core_chat_api core_chat_data core_chat_domain core_chat_presentation dukan_api dukan_data dukan_domain dukan_presentation faith_api faith_data faith_domain faith_presentation identity_api identity_data identity_domain identity_presentation trends_api trends_data trends_domain trends_presentation wallet_api wallet_data wallet_domain wallet_presentation'

          if grep -qE '^iosApp/' <<< "$CHANGED_FILES"; then
            echo "has_ios_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_ios_changes=false" >> $GITHUB_OUTPUT
          fi

          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
          FINAL_MODULES=""
          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
            fi
          done

          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/|^iosApp/' <<< "$CHANGED_FILES"; then
            echo "build_all=true" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
            if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
              echo "build_all=false" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "modules=$JSON_ARRAY" >> $GITHUB_OUTPUT
            else
              echo "build_all=false" >> $GITHUB_OUTPUT
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "modules=[]" >> $GITHUB_OUTPUT
            fi
          fi

  ios-build:
    name: iOS Build
    needs: changed-modules
    runs-on: macos-latest
    if: needs.changed-modules.outputs.has_changes == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - run: chmod +x gradlew

      - name: Discover iOS Build Task
        id: discover
        run: |
          BUILD_TASK="build"
          if ./gradlew tasks --all | grep -q "linkDebugFrameworkIosSimulatorArm64"; then
            BUILD_TASK="linkDebugFrameworkIosSimulatorArm64"
          elif ./gradlew tasks --all | grep -q "assembleDebugIosSimulatorArm64"; then
            BUILD_TASK="assembleDebugIosSimulatorArm64"
          fi
          echo "build_task=$BUILD_TASK" >> $GITHUB_OUTPUT

      - name: Build All Modules
        if: needs.changed-modules.outputs.build_all == 'true'
        run: ./gradlew :composeApp:${{ steps.discover.outputs.build_task }}

      - name: Build Only Changed Modules
        if: needs.changed-modules.outputs.build_all == 'false'
        run: ./gradlew :composeApp:${{ steps.discover.outputs.build_task }}

      - name: Resolve Swift Packages
        run: xcodebuild -project iosApp/iosApp.xcodeproj -resolvePackageDependencies

      - name: Build iOS App
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme "iosApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  notify-slack-on-failure:
    if: failure()
    needs: ios-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Slack on failure
        uses: ./.github/actions/slack/send-pr-notification-to-slack
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-notification-channel-id: ${{ secrets.SLACK_NOTIFICATION_CHANNEL_ID }}
          bot-app-id: ${{ secrets.BOT_APP_ID }}
          branch-name: ${{ github.head_ref }}
          message: |
            🚨 *Build Failed on IOS!*
            One or more matrix jobs failed.
            PR: ${{ github.event.pull_request.html_url }}
            Commit: ${{ github.sha }}