name: iOS CI (combined build)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  changed-modules:
    uses: ./.github/workflows/changed-modules.yml

  ios-build:
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Select Xcode version
        run: xcodebuild -version

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Build changed KMP modules + composeApp (single runner)
        run: |
          MODULES='${{ needs.changed-modules.outputs.modules }}'
          echo "Changed modules: $MODULES"

          if [ "$MODULES" = "[]" ]; then
            echo "No changed modules detected -> nothing to build."
            exit 0
          fi

          MODULE_TASKS=$(echo $MODULES | jq -r '.[] | ":"+.+":build"' | tr '\n' ' ')
          echo "Gradle tasks to run: $MODULE_TASKS :composeApp:build"
          ./gradlew $MODULE_TASKS :composeApp:build --no-daemon --stacktrace

      - name: Resolve Swift Package Dependencies
        run: |
          if [ -f iosApp/iosApp.xcodeproj ]; then
            xcodebuild -project iosApp/iosApp.xcodeproj -resolvePackageDependencies || true
          else
            echo "No iosApp.xcodeproj found; skipping SPM resolve."
          fi

      - name: Build iOS App for Simulator (Xcode)
        if: always()
        run: |
          if [ -f iosApp/iosApp.xcodeproj ]; then
            xcodebuild \
              -project iosApp/iosApp.xcodeproj \
              -scheme "iosApp" \
              -configuration Debug \
              -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
              build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          else
            echo "No iosApp project found; xcodebuild skipped."
          fi

  ios-build-summary:
    needs: [changed-modules, ios-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          if [ "${{ needs.changed-modules.outputs.has_changes }}" = "false" ]; then
            echo "✅ No changes detected in modules that affect iOS. Skipping build."
          elif [ "${{ needs.changed-modules.outputs.has_ios_changes }}" = "true" ]; then
            echo "📱 iOS app files changed - full rebuild triggered."
          else
            echo "🎯 Built shared module(s): ${{ needs.changed-modules.outputs.modules }}"
          fi