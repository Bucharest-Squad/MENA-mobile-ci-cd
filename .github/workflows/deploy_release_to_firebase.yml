name: Deploy APK to Firebase

on:
  workflow_call:
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEY_ALIAS_PASSWORD:
        required: true
      FIREBASE_APP_ID:
        required: true
      CREDENTIAL_FILE_CONTENT:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    uses: ./.github/workflows/build_release.yml
    secrets:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
    outputs:
      signed-apk-path: ${{ steps.sign_app.outputs.signedReleaseFile }}

  deploy-to-firebase:
    runs-on: ubuntu-latest
    needs: build-release-apk
    steps:
      - name: Upload signed APK to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          file: ${{ needs.build-release-apk.outputs.signed-apk-path }}
          debug: true
          group: tester