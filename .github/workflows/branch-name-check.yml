name: Enforce Branch Naming Convention

on:
  push:
    branches:
      - '**'
  create:
    branches:
      - '**'

jobs:
  enforce-branch-name:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to delete branches
    steps:
      - name: Get branch name and validate
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "create" ]]; then
            # full ref comes in github.event.ref (e.g. refs/heads/feature/CHT-32-test)
            BRANCH_NAME="${{ github.event.ref }}"
            BRANCH_NAME="${BRANCH_NAME#refs/heads/}"
          else
            BRANCH_NAME="${GITHUB_REF##*/}"
          fi

          echo "Branch: $BRANCH_NAME"

          # Allowed prefixes and Jira keys
          if [[ ! "$BRANCH_NAME" =~ ^(feature|fix|refactor|test)\/(IDN|DKN|CHT|FTH|TRN|WLT)-[0-9]+(-[a-z0-9-]+)*$ ]]; then
            echo "❌ Invalid branch name: $BRANCH_NAME"
            echo "Deleting branch..."

            curl -s -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/$BRANCH_NAME"

            echo "✅ Invalid branch deleted successfully."
            exit 0
          fi

          echo "✅ Branch name is valid."