name: Enforce Branch Naming Convention

on:
  push:
    branches:
      - '**'  # validate all branches

jobs:
  enforce-branch-name:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to delete branches
    steps:
      - name: Get branch name and validate
        run: |
          # Get branch name
          BRANCH_NAME="${GITHUB_REF##*/}"
          echo "Branch: $BRANCH_NAME"

          # Check if branch is new (first push)
          if [[ "${GITHUB_EVENT_BEFORE}" == "0000000000000000000000000000000000000000" ]]; then
            IS_NEW_BRANCH=true
          else
            IS_NEW_BRANCH=false
          fi

          # Allowed prefixes and Jira keys
          REGEX="^(feature|fix|refactor|test)\/(IDN|DKN|CHT|FTH|TRN|WLT)-[0-9]+(-[a-z0-9-]+)*$"

          if [[ ! "$BRANCH_NAME" =~ $REGEX ]]; then
            echo "❌ Invalid branch name: $BRANCH_NAME"

            if [[ "$IS_NEW_BRANCH" == true ]]; then
              echo "Deleting invalid new branch..."
              curl -s -X DELETE \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/$BRANCH_NAME"
              echo "✅ Invalid branch deleted successfully."
            else
              echo "⚠️ Branch name is invalid but already existed, not deleting."
            fi
            exit 0
          fi

          echo "✅ Branch name is valid."