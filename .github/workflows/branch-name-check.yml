name: Enforce Branch Naming Convention

on:
  push:
    branches:
      - '**'
  create:
    branches:
      - '**'

jobs:
  enforce-branch-name:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to delete branches
    steps:
      - name: Get branch name
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "create" ]]; then
            BRANCH_NAME="${GITHUB_REF_NAME}"
          else
            BRANCH_NAME="${GITHUB_REF##*/}"
          fi

          echo "Branch: $BRANCH_NAME"

          # Allowed prefixes and Jira keys
          if [[ ! "$BRANCH_NAME" =~ ^(feature|fix|refactor|test)\/(IDN|DKN|CHT|FTH|TRN|WLT)-[0-9]+(-[a-z0-9-]+)*$ ]]; then
            echo "❌ Invalid branch name: $BRANCH_NAME"
            echo "Deleting branch..."

            # Delete branch via GitHub API
            BRANCH_REF="refs/heads/$BRANCH_NAME"
            curl -s -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/git/$BRANCH_REF"

            exit 1
          fi

          echo "✅ Branch name is valid."