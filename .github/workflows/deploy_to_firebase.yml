name: Deploy to Firebase

on:
  workflow_call:
    inputs:
      release_notes:
        required: false
        type: string
    secrets:
      GOOGLE_SERVICES_JSON_BASE64:
        required: true
      ANDROID_KEYSTORE_BASE64:
        required: true
      KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEY_ALIAS_PASSWORD:
        required: true
      FIREBASE_APP_ID:
        required: true
      CREDENTIAL_FILE_CONTENT:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p composeApp/
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > composeApp/google-services.json

      - name: Decode Keystore and Create local.properties
        run: |
          rm -f composeApp/JKS.jks local.properties release_notes.txt
          echo "ANDROID_KEYSTORE_BASE64" | base64 -d > composeApp/JKS.jks
          echo "KEYSTORE_PASSWORD = $KEYSTORE_PASSWORD" >> local.properties
          echo "ANDROID_KEY_ALIAS = $KEY_ALIAS" >> local.properties
          echo "ANDROID_KEY_ALIAS_PASSWORD = ANDROID_KEY_ALIAS_PASSWORD" >> local.properties

      - name: Generate Signed APK
        run: |
          ./gradlew assembleRelease --build-cache -x test -x lint

      - name: Version Bump
        uses: chkfung/android-version-actions@v1.2.3
        with:
          gradlePath: composeApp/build.gradle.kts
          versionCode: ${{ github.run_number }}

      - name: Create Release Notes
        run: |
          echo "${{ inputs.release_notes }}" > release_notes.txt

      - name: Upload apk to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          file: composeApp/build/outputs/apk/release/composeApp-release.apk
          releaseNotesFile: release_notes.txt