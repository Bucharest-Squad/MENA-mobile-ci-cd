name: 'Send Slack Message'

inputs:
  slack-bot-token:
    required: true
  slack-channel-id:
    required: true
  branch-name:
    required: true
  message:
    required: true

runs:
  using: "composite"
  steps:
    - name: Install jq
      shell: bash
      run: |
        sudo apt-get update && sudo apt-get install -y jq

    - name: Send Slack message
      shell: bash
      run: |
        messages=$(curl -s -X POST "https://slack.com/api/conversations.history" \
          -H "Authorization: Bearer ${{ inputs.slack-bot-token }}" \
          -H "Content-type: application/json" \
          --data "{\"channel\": \"${{ inputs.slack-channel-id }}\"}")

        REGIONS=("WLT" "TRN" "FTH" "CHT" "DKN" "IDN")
        team=$(echo "${{ inputs.branch-name }}" | cut -d'/' -f2)
        prefix="${team:0:3}"

        for i in "${!REGIONS[@]}"; do
          if [[ "${REGIONS[$i]}" == "$prefix" ]]; then
            thread_ts=$(echo "$messages" | jq -r ".messages[$i].ts")

            curl -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer ${{ inputs.slack-bot-token }}" \
              -H "Content-type: application/json; charset=utf-8" \
              --data "{
                \"channel\": \"${{ inputs.slack-channel-id }}\",
                \"thread_ts\": \"$thread_ts\",
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"${{ inputs.message }}\"
                    }
                  }
                ]
              }"
          fi
        done
