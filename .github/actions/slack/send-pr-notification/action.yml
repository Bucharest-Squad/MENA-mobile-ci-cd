name: 'Send Slack Message'

inputs:
  slack-bot-token:
    required: true
  slack-notification-channel-id:
    required: true
  bot-app-id:
    required: true
  branch-name:
    required: true
  message:
    required: true

runs:
  using: "composite"
  steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Install jq
      shell: bash
      run: |
        sudo apt-get update && sudo apt-get install -y jq

    - name: Send Slack message
      id: count
      shell: bash
      run: |
        messages=$(curl -s -X POST "https://slack.com/api/conversations.history" \
          -H "Authorization: Bearer ${{ inputs.slack-bot-token }}" \
          -H "Content-type: application/json" \
          --data "{\"channel\": \"${{ inputs.slack-notification-channel-id }}\"}")
        
        bot_messages=$(echo "$messages" | jq --arg app_id "${{ inputs.bot-app-id }}" '.messages[] | select(.app_id == $app_id)')
        
        message_count=$(echo "$bot_messages" | jq -r '.messages | length' 2>/dev/null || echo 0)
        
        echo "message_count=$message_count" >> $GITHUB_OUTPUT
        echo "bot_messages :$bot_messages"
        echo "bot_messages=$bot_messages" >> $GITHUB_ENV

    - name: Send Slack messages (only if empty)
      if: ${{ steps.count.outputs.message_count < 6 }}
      uses: ./.github/actions/slack/send-default-template
      with:
        slack-bot-token: ${{ inputs.slack-bot-token }}
        slack-notification-channel-id: ${{ inputs.slack-notification-channel-id }}
        bot-app-id: ${{ inputs.bot-app-id }}

    - name: Send Slack messages
      shell: bash
      env:
        bot_messages: ${{ env.bot_messages }}
        message_count: ${{ steps.count.outputs.message_count }}
      run: |
        echo "bot_messages is :$bot_messages"
        REGIONS=("IDN" "DKN" "CHT" "FTH" "TRN" "WLT")
        team=$(echo "${{ inputs.branch-name }}" | cut -d'/' -f2)
        prefix="${team:0:3}"
        echo "${REGIONS[$i]} = $prefix"
        for i in "${!REGIONS[@]}"; do
          if [[ "${REGIONS[$i]}" == "$prefix" ]]; then
            thread_ts=$(echo "$bot_messages" | jq -r ".messages[message_count - 1 - $i].ts")
            echo "$thread_ts"
            curl -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer ${{ inputs.slack-bot-token }}" \
              -H "Content-type: application/json; charset=utf-8" \
              --data "{
                \"channel\": \"${{ inputs.slack-notification-channel-id }}\",
                \"thread_ts\": \"$thread_ts\",
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"${{ inputs.message }}\"
                    }
                  }
                ]
              }"
          fi
        done
