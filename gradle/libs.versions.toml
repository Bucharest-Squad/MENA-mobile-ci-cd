navigationCompose = "2.9.0-rc02"
ksp = "2.2.10-RC2-2.0.2"
koin-core = "4.1.0"
koin-annotations = "2.1.0"
kotlinx-serialization = "1.6.3"

ktorClientCore = "3.2.3"
multiplatformSettings = "1.3.0"
securityCrypto = "1.1.0"
koin = "4.0.0"
[libraries]
